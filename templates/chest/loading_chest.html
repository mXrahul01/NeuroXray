<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing X-rays | NeuroXray</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-deep: #030712;
            --accent-cyan: #06b6d4;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg-deep); color: var(--text-main); margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .ambient-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: radial-gradient(circle at 50% 50%, rgba(6, 182, 212, 0.15), transparent 50%); animation: pulseBg 4s infinite alternate; }

        .loading-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 24px; padding: 60px 40px; text-align: center; backdrop-filter: blur(20px); box-shadow: 0 25px 50px rgba(0,0,0,0.5); max-width: 500px; width: 90%; }

        .loader-container { position: relative; width: 120px; height: 120px; margin: 0 auto 30px; }
        .circle-outer { position: absolute; width: 100%; height: 100%; border: 3px solid transparent; border-top-color: var(--accent-cyan); border-bottom-color: var(--accent-cyan); border-radius: 50%; animation: spin 2s linear infinite; box-shadow: 0 0 20px rgba(6, 182, 212, 0.3); }
        .circle-inner { position: absolute; top: 15px; left: 15px; width: 90px; height: 90px; border: 3px solid transparent; border-left-color: #67e8f9; border-right-color: #67e8f9; border-radius: 50%; animation: spin-reverse 1.5s linear infinite; }
        .loader-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; color: var(--accent-cyan); animation: pulseIcon 2s infinite; }

        .title { font-size: 1.8rem; font-weight: 700; margin-bottom: 10px; color: #fff; }
        .subtitle { color: var(--text-muted); font-size: 1rem; line-height: 1.5; margin-bottom: 30px; }

        .progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; position: relative; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #0891b2, var(--accent-cyan)); width: 0%; box-shadow: 0 0 15px var(--accent-cyan); animation: fillProgress 6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }
        @keyframes pulseIcon { 0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(0.9); } 50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); } }
        @keyframes pulseBg { 0% { opacity: 0.5; } 100% { opacity: 1; } }
        @keyframes fillProgress { 0% { width: 0%; } 20% { width: 30%; } 50% { width: 60%; } 80% { width: 90%; } 100% { width: 100%; } }
    </style>
</head>
<body>
<div class="ambient-bg"></div>

<div class="loading-card">
    <div class="loader-container">
        <div class="circle-outer"></div>
        <div class="circle-inner"></div>
        <i class="fas fa-lungs loader-icon"></i>
    </div>

    <div class="title">LNN Engine Active</div>
    <div class="subtitle">Extracting spatial features and compiling diagnostic probabilities from X-ray batch...</div>

    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>
    <p style="color: var(--accent-cyan); font-size: 0.85rem; margin-top: 15px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;">Processing Request</p>
</div>

<script>
    // Redirect to Chest Bulk Result page after 6 seconds with the correct batch_id
    setTimeout(() => {
        window.location.href = "{{ url_for('chest_result_bulk', batch_id=batch_id) }}";
    }, 6000);
</script>
</body>
</html>
